<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 주간 공모전 리포트</title>
    <style>
        :root { --primary: #3498db; --secondary: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; line-height: 1.7; color: #333; max-width: 900px; margin: 0 auto; padding: 40px 20px; background-color: var(--bg); }
        .report-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        header { border-bottom: 2px solid var(--primary); margin-bottom: 30px; padding-bottom: 20px; }
        h1 { margin: 0; color: var(--secondary); font-size: 1.8em; }
        .date-badge { display: inline-block; background: var(--secondary); color: white; padding: 4px 12px; border-radius: 5px; font-size: 0.85em; margin-top: 10px; }
        
        .contest-item { border: 1px solid #eee; border-radius: 10px; padding: 25px; margin-bottom: 25px; background: #fff; transition: transform 0.2s; }
        .contest-item:hover { transform: translateY(-3px); border-color: var(--primary); }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .item-title { font-size: 1.25em; font-weight: 800; color: #1a1a1a; flex: 1; }
        .status-tag { margin-left: 15px; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: bold; white-space: nowrap; }
        .status-ing { background: #e1f5fe; color: #01579b; }
        .status-urgent { background: #ffebee; color: #c62828; }

        .info-row { display: flex; margin-bottom: 8px; font-size: 0.95em; }
        .info-label { width: 100px; font-weight: bold; color: #7f8c8d; flex-shrink: 0; }
        .info-content { color: #444; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .apply-btn { flex: 1; text-align: center; padding: 10px 15px; background: var(--primary); color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 0.9em; transition: 0.3s; }
        .main-btn { flex: 1; text-align: center; padding: 10px 15px; background: #ecf0f1; color: #7f8c8d; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 0.9em; transition: 0.3s; }
        .apply-btn:hover { background: #2980b9; box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3); }
        .main-btn:hover { background: #bdc3c7; color: white; }

        @media print { .btn-group { display: none; } }
    </style>
</head>
<body>
